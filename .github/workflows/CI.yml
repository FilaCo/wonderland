name: CI

on: [push, pull_request]

jobs:
  build:
    permissions:
      contents: write # to push pages branch (peaceiris/actions-gh-pages)
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      matrix:
        config:
        - {
            name: "Ubuntu Latest",
            os: ubuntu-latest,
          }
        meson_version: ["1.3.0", "1.4.0"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: python3 -m pip install meson==${{ matrix.meson_version }} ninja
      - name: Install Doxygen
        run: sudo apt-get install doxygen
        if: ${{ matrix.config.name == 'Ubuntu Latest' }}
      - name: Setup
        run: meson setup build/
      - name: Check Format
        run: ninja -C build/ clang-format-check
      - name: Lint
        run: meson compile -C build/ -v lint
      - name: Build
        run: meson compile -C build/ -v
      - name: Test
        run: meson test -C build/ -v --no-suite google-benchmark
      - name: Upload Test Log
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: ${{ matrix.config.os }}_Meson_Testlog
          path: build/meson-logs/testlog.txt
      - name: Generate API reference documentation
        run: meson compile -C build/ docs_ref
        if: ${{ github.ref_name == 'master' && github.event_name == 'push' && matrix.config.name == 'Ubuntu Latest' }}
      - name: Publish Internal documentation to Github pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/docs/ref/html
          force_orphan: true
        if: ${{ github.ref_name == 'master' && github.event_name == 'push' && matrix.config.name == 'Ubuntu Latest' }}
      