name: CI

on: [push, pull_request]

jobs:
  build:
    name: Test on ${{ matrix.os }} with Meson v${{ matrix.meson_version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest", "windows-latest"]
        meson_version: ["1.3.0", "1.4.0"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: python3 -m pip install meson==${{ matrix.meson_version }} ninja
      - name: Configure Project
        run: meson setup build/
      - name: Run
        run: meson test -C build/ -v --no-suite google-benchmark
      - name: Upload Test Log
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ${{ matrix.os }}_Meson_Testlog
          path: build/meson-logs/testlog.txt
